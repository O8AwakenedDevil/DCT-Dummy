<head>
    <script src="menu.js" type="module"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DCT-Dart</title>
    <link rel="icon" type="image/favicon" href="img/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="DCT.css">
</head>

<body>
    <header>
        <div id="banner"><h1>Welkom op Dartcounter DCT</h1></div>
    </header>
    <div class="menu">
        <button class="menu-toggle" aria-label="Menu" aria-expanded="false">&#9776;</button> 
        <a href="index.html"><i class="fa fa-fw fa-home"></i>Home</a>
        <a href="klassementen.html">Klassementen</a>
        <a href="wedstrijden.html" class="active">Wedstrijden</a>
        <a href="bekercompetitie.html">Bekercompetitie</a>
        <a href="rangschikking.html">Rangschikking</a>
        <a href="rules.html">Regels Competitie</a>
        <a href="beheerders.html">Beheerders</a>
    </div>
    <div class="container">
        <div class="sideKlasse">
            <a href="#" id="wk1">Week 1</a>
            <a href="#" id="wk2">Week 2</a>
            <a href="#" id="wk3">Week 3</a>
            <a href="#" id="wk4">Week 4</a>
            <a href="#" id="wk5">Week 5</a>
            <a href="#" id="wk6">Week 6</a>
            <a href="#" id="wk7">Week 7</a>
            <a href="#" id="wk8">Week 8</a>
            <a href="#" id="wk9">Week 9</a>
        </div>

        <div class="main">
            <fieldset style="margin-top: 10px;">
                <legend id="weekLegend">Wedstrijden: Week 1 (23/03 - 29/03)</legend>
                <form id="dataForm">
                    <label for="speler1">Speler 1:</label>
                    <input type="text" id="speler1" required>&nbsp;&nbsp;&nbsp;

                    <label for="speler2">Speler 2:</label>
                    <input type="text" id="speler2" required>&nbsp;&nbsp;&nbsp;

                    <label for="datumTijd">Datum:</label>
                    <input type="date" id="datumTijd" required>&nbsp;&nbsp;&nbsp;

                    <label for="uur">Uur:</label>
                    <input type="time" id="uur" required>&nbsp;&nbsp;&nbsp;

                    <label for="klasse">Klasse:</label>
                    <select id="klasse" required>
                        <option value="Klasse1">Klasse 1</option>
                        <option value="Klasse2">Klasse 2</option>
                        <option value="Klasse3">Klasse 3</option>
                        <option value="Klasse4">Klasse 4</option>
                        <option value="Klasse5">Klasse 5</option>
                        <option value="Klasse6">Klasse 6</option>
                        <option value="Klasse7">Klasse 7</option>
                        <option value="Klasse8">Klasse 8</option>
                    </select>&nbsp;&nbsp;&nbsp;

                    <button type="submit">Toevoegen</button>
                </form>
            </fieldset>
            <div id="tablesContainer"></div>
        </div>
    </div>
</body>

<footer>
